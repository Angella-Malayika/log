<section id="contact" class="py-5 bg-light">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-10 col-lg-7">
                <div class="card shadow-sm">
                    <div class="card-body p-4 p-md-5">
                        <h1 class="h3 mb-4 text-center">Contact Me</h1>
                        <form action="#" method="post">
                            <div class="mb-3">
                                <label for="fullName" class="form-label">Name</label>
                                <input type="text" class="form-control" id="fullName" name="name" placeholder="Enter your full name" required>
                            </div>

                            <div class="mb-3">
                                <label for="emailAddress" class="form-label">Email</label>
                                <input type="email" class="form-control" id="emailAddress" name="email" placeholder="Enter your email" required>
                            </div>

                            <div class="mb-4">
                                <label for="messageText" class="form-label">Message</label>
                                <textarea class="form-control" id="messageText" name="message" rows="5" placeholder="Write your message" required></textarea>
                            </div>

                            <button type="submit" class="btn btn-primary w-100">Submit</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
